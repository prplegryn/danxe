name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Flutter Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve packages
        run: flutter pub get

      - name: Vendor MMD renderer assets
        run: |
          set -euo pipefail
          base="https://cdn.jsdelivr.net/npm/three@0.160.0"
          root="android/app/src/main/assets/vendor"
          mkdir -p "$root/examples/jsm/loaders" "$root/examples/jsm/animation" "$root/examples/jsm/controls" "$root/examples/jsm/shaders" "$root/examples/jsm/libs"
          curl -fsSL "$base/build/three.module.js" -o "$root/three.module.js"
          curl -fsSL "$base/examples/jsm/loaders/MMDLoader.js" -o "$root/examples/jsm/loaders/MMDLoader.js"
          curl -fsSL "$base/examples/jsm/loaders/TGALoader.js" -o "$root/examples/jsm/loaders/TGALoader.js"
          curl -fsSL "$base/examples/jsm/animation/MMDAnimationHelper.js" -o "$root/examples/jsm/animation/MMDAnimationHelper.js"
          curl -fsSL "$base/examples/jsm/animation/CCDIKSolver.js" -o "$root/examples/jsm/animation/CCDIKSolver.js"
          curl -fsSL "$base/examples/jsm/animation/MMDPhysics.js" -o "$root/examples/jsm/animation/MMDPhysics.js"
          curl -fsSL "$base/examples/jsm/controls/OrbitControls.js" -o "$root/examples/jsm/controls/OrbitControls.js"
          curl -fsSL "$base/examples/jsm/shaders/MMDToonShader.js" -o "$root/examples/jsm/shaders/MMDToonShader.js"
          curl -fsSL "$base/examples/jsm/libs/mmdparser.module.js" -o "$root/examples/jsm/libs/mmdparser.module.js"
          curl -fsSL "$base/examples/jsm/libs/ammo.wasm.js" -o "$root/examples/jsm/libs/ammo.wasm.js"
          curl -fsSL "$base/examples/jsm/libs/ammo.wasm.wasm" -o "$root/examples/jsm/libs/ammo.wasm.wasm"

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: danxe-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
