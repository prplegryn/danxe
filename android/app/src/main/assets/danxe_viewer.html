<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danxe MMD Renderer</title>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/examples/jsm/"
      }
    }
  </script>
  <style>
    html, body, #stage {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      color: #e5e7eb;
      font-family: system-ui, sans-serif;
    }
    #status {
      position: fixed;
      left: 50%;
      top: 50%;
      max-width: min(72vw, 560px);
      transform: translate(-50%, -50%);
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 8px;
      background: rgba(15,23,42,.82);
      line-height: 1.45;
      text-align: center;
      white-space: pre-wrap;
      pointer-events: none;
    }
    #status.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="status">Renderer ready. Select a PMX model.</div>
  <script src="./vendor/examples/jsm/libs/ammo.wasm.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
    import { MMDAnimationHelper } from 'three/addons/animation/MMDAnimationHelper.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OutlineEffect } from 'three/addons/effects/OutlineEffect.js';

    const stage = document.getElementById('stage');
    const statusEl = document.getElementById('status');
    const clock = new THREE.Clock();
    const environmentColor = 0xffffff;
    const defaultLook = Object.freeze({
      preset: 'balanced',
      enabled: true,
      exposure: 1.03,
      contrast: 1.26,
      saturation: 1.36,
      brightness: 1.03,
      dehaze: 0.11,
      ambient: 1.16,
      key: 1.72,
      rim: 0.52,
      specular: 0.56,
      shininess: 34,
      toon: 1.16,
      texture: 1.30,
      floor: true
    });
    const neutralLook = Object.freeze({
      ...defaultLook,
      enabled: false,
      exposure: 1.0,
      contrast: 1.0,
      saturation: 1.0,
      brightness: 1.0,
      dehaze: 0.0,
      ambient: 2.0,
      key: 2.1,
      rim: 0.0,
      specular: 1.0,
      shininess: 30,
      toon: 1.0,
      texture: 1.0
    });
    const state = {
      renderer: null,
      effect: null,
      scene: null,
      camera: null,
      controls: null,
      hemiLight: null,
      keyLight: null,
      keyLightTarget: null,
      rimLight: null,
      grid: null,
      floorPlane: null,
      contactShadow: null,
      helper: null,
      mesh: null,
      modelInstances: [],
      audio: null,
      listener: null,
      current: 0,
      duration: 0,
      speed: 1,
      playing: false,
      loading: false,
      loaded: false,
      cameraMotion: false,
      manualCamera: { yaw: 18, pitch: -8, distance: 5.4 },
      modelUrl: null,
      sceneSignature: '',
      physicsReady: false,
      physicsEnabled: false,
      physicsWarningShown: false,
      recorder: null,
      look: { ...defaultLook },
      view: {
        gridVisible: true,
        floorVisible: false
      },
      parts: []
    };
    let ammoReadyPromise = null;

    const physicsProfile = Object.freeze({
      name: 'weighted-stable',
      gravityY: -118,
      unitStep: 1 / 80,
      maxStepNum: 4,
      playbackStep: 1 / 75,
      exportStep: 1 / 90,
      loadWarmup: 120,
      seekWarmup: 72,
      exportWarmup: 150,
      loopWarmup: 36
    });

    const physicsParams = {
      physics: true,
      warmup: physicsProfile.loadWarmup,
      unitStep: physicsProfile.unitStep,
      maxStepNum: physicsProfile.maxStepNum,
      gravity: new THREE.Vector3(0, physicsProfile.gravityY, 0)
    };
    const physicsFrameStep = physicsProfile.playbackStep;

    function post(payload) {
      if (window.DanxeAndroid && window.DanxeAndroid.postStatus) {
        window.DanxeAndroid.postStatus(JSON.stringify(payload));
      }
    }

    function setStatus(text, hidden = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle('hidden', hidden);
      post({ type: 'message', message: text, hidden });
    }

    async function ensurePhysicsReady() {
      if (state.physicsReady) return true;
      if (globalThis.Ammo && globalThis.Ammo.btVector3) {
        state.physicsReady = true;
        return true;
      }
      if (typeof globalThis.Ammo !== 'function') {
        postPhysicsWarning('Ammo physics runtime is unavailable.');
        return false;
      }
      if (!ammoReadyPromise) {
        ammoReadyPromise = globalThis.Ammo({
          locateFile: (file) => `./vendor/examples/jsm/libs/${file}`
        }).then((ammo) => {
          globalThis.Ammo = ammo;
          state.physicsReady = true;
          post({ type: 'message', message: 'MMD physics ready.', hidden: true });
          return true;
        }).catch((error) => {
          postPhysicsWarning(error && error.message ? error.message : String(error));
          return false;
        });
      }
      return ammoReadyPromise;
    }

    function postPhysicsWarning(message) {
      if (state.physicsWarningShown) return;
      state.physicsWarningShown = true;
      post({ type: 'message', message: `MMD physics disabled: ${message}`, hidden: true });
    }

    function initRenderer() {
      if (state.renderer) return;
      state.scene = new THREE.Scene();
      state.scene.background = new THREE.Color(environmentColor);
      state.camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 2000);
      state.camera.position.set(0, 10, 35);
      state.listener = new THREE.AudioListener();
      state.camera.add(state.listener);
      state.scene.add(state.camera);

      state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      state.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      state.renderer.setSize(innerWidth, innerHeight);
      state.renderer.outputColorSpace = THREE.SRGBColorSpace;
      state.renderer.toneMapping = THREE.LinearToneMapping;
      state.renderer.toneMappingExposure = defaultLook.exposure;
      state.renderer.shadowMap.enabled = true;
      state.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      state.effect = new OutlineEffect(state.renderer, {
        defaultThickness: 0.0032,
        defaultColor: [0.018, 0.021, 0.028],
        defaultAlpha: 0.58,
        defaultKeepAlive: true
      });
      stage.appendChild(state.renderer.domElement);

      state.controls = new OrbitControls(state.camera, state.renderer.domElement);
      state.controls.enableDamping = true;
      state.controls.target.set(0, 10, 0);

      state.hemiLight = new THREE.HemisphereLight(environmentColor, environmentColor, defaultLook.ambient);
      state.scene.add(state.hemiLight);
      state.keyLightTarget = new THREE.Object3D();
      state.keyLightTarget.position.set(0, 8, 0);
      state.scene.add(state.keyLightTarget);
      state.keyLight = new THREE.DirectionalLight(0xffffff, defaultLook.key);
      state.keyLight.position.set(20, 32, 18);
      state.keyLight.target = state.keyLightTarget;
      state.keyLight.castShadow = true;
      state.keyLight.shadow.mapSize.set(1536, 1536);
      state.keyLight.shadow.bias = -0.00018;
      state.keyLight.shadow.normalBias = 0.018;
      state.scene.add(state.keyLight);
      state.rimLight = new THREE.DirectionalLight(0xb7d8ff, defaultLook.rim);
      state.rimLight.position.set(-18, 18, -24);
      state.scene.add(state.rimLight);
      state.grid = new THREE.GridHelper(80, 40, 0x9ca3af, 0xd1d5db);
      state.grid.position.y = 0;
      state.scene.add(state.grid);
      state.floorPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(80, 80),
        new THREE.MeshStandardMaterial({
          color: 0xd9c39e,
          roughness: 0.88,
          metalness: 0.0,
          side: THREE.DoubleSide
        })
      );
      state.floorPlane.receiveShadow = true;
      state.floorPlane.rotation.x = -Math.PI / 2;
      state.floorPlane.position.y = -0.015;
      state.scene.add(state.floorPlane);
      state.contactShadow = new THREE.Mesh(
        new THREE.CircleGeometry(1, 64),
        new THREE.MeshBasicMaterial({
          color: 0x0f172a,
          transparent: true,
          opacity: 0.16,
          depthWrite: false
        })
      );
      state.contactShadow.rotation.x = -Math.PI / 2;
      state.contactShadow.position.y = 0.006;
      state.contactShadow.renderOrder = 2;
      state.scene.add(state.contactShadow);
      applyViewOptions();
      applyLook();

      window.addEventListener('resize', resize, false);
      resize();
      requestAnimationFrame(tick);
    }

    function setLook(payload) {
      state.look = normalizeLook(payload);
      applyLook();
      postStatus();
    }

    function setView(payload) {
      const source = payload && typeof payload === 'object' ? payload : {};
      if ('floorVisible' in source) {
        state.view.floorVisible = source.floorVisible === true;
      }
      if ('gridVisible' in source) {
        state.view.gridVisible = source.gridVisible === true;
      }
      if (state.view.floorVisible) {
        state.view.gridVisible = false;
      }
      applyViewOptions();
      postStatus();
    }

    function applyViewOptions() {
      const floorVisible = state.view.floorVisible === true;
      const gridVisible = state.view.gridVisible === true && !floorVisible;
      if (state.grid) state.grid.visible = gridVisible;
      if (state.floorPlane) state.floorPlane.visible = floorVisible;
    }

    function normalizeLook(payload) {
      const source = payload && typeof payload === 'object' ? payload : {};
      return {
        preset: source.preset ? String(source.preset) : defaultLook.preset,
        enabled: source.enabled !== false,
        exposure: clampNumber(source.exposure, defaultLook.exposure, 0.5, 2.0),
        contrast: clampNumber(source.contrast, defaultLook.contrast, 0.5, 2.5),
        saturation: clampNumber(source.saturation, defaultLook.saturation, 0.3, 3.0),
        brightness: clampNumber(source.brightness, defaultLook.brightness, 0.5, 1.6),
        dehaze: clampNumber(source.dehaze, defaultLook.dehaze, 0.0, 0.55),
        ambient: clampNumber(source.ambient, defaultLook.ambient, 0.0, 4.0),
        key: clampNumber(source.key, defaultLook.key, 0.0, 5.0),
        rim: clampNumber(source.rim, defaultLook.rim, 0.0, 3.0),
        specular: clampNumber(source.specular, defaultLook.specular, 0.0, 2.0),
        shininess: clampNumber(source.shininess, defaultLook.shininess, 1.0, 120.0),
        toon: clampNumber(source.toon, defaultLook.toon, 0.3, 2.0),
        texture: clampNumber(source.texture, defaultLook.texture, 0.3, 2.5),
        floor: source.floor !== false
      };
    }

    function clampNumber(value, fallback, min, max) {
      const number = Number(value);
      return Number.isFinite(number) ? clamp(number, min, max) : fallback;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function activeMeshes() {
      if (Array.isArray(state.modelInstances) && state.modelInstances.length > 0) {
        return state.modelInstances.map((item) => item.mesh).filter(Boolean);
      }
      return state.mesh ? [state.mesh] : [];
    }

    function applyLook() {
      const raw = state.look || defaultLook;
      const enabled = raw.enabled !== false;
      const look = enabled ? raw : { ...neutralLook, floor: raw.floor !== false };

      if (state.scene) {
        state.scene.background = new THREE.Color(environmentColor);
      }
      if (state.renderer) {
        state.renderer.toneMapping = enabled ? THREE.LinearToneMapping : THREE.NoToneMapping;
        state.renderer.toneMappingExposure = look.exposure;
      }
      if (state.hemiLight) {
        state.hemiLight.intensity = look.ambient;
      }
      if (state.keyLight) {
        state.keyLight.intensity = look.key;
      }
      if (state.rimLight) {
        state.rimLight.intensity = look.rim;
      }
      applyViewOptions();
      for (const mesh of activeMeshes()) {
        mesh.traverse((child) => {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          for (const material of materials) {
            applyMaterialLook(material, look, enabled);
          }
        });
      }
    }

    function applyMaterialLook(material, look, enabled) {
      if (!material) return;
      ensureMaterialLookShader(material);
      updateLookShaderUniforms(material, look, enabled);
      prepareTextureColorSpace(material);
      const base = materialLookBase(material);
      if (!base) return;

      if (base.color && material.color) {
        material.color.copy(base.color);
        if (enabled) tuneColor(material.color, look);
      }
      if (base.emissive && material.emissive) {
        material.emissive.copy(base.emissive);
        if (enabled) material.emissive.multiplyScalar(look.toon);
      }
      if (base.specular && material.specular) {
        material.specular.copy(base.specular);
        if (enabled) material.specular.multiplyScalar(look.specular);
      }
      if (base.shininess !== null && 'shininess' in material) {
        material.shininess = enabled ? look.shininess : base.shininess;
      }

      restoreUniformColor(material, base, 'diffuse');
      restoreUniformColor(material, base, 'emissive');
      restoreUniformColor(material, base, 'specular');
      restoreUniformNumber(material, base, 'shininess');
      if (enabled) {
        tuneUniformColor(material, 'diffuse', look);
        multiplyUniformColor(material, 'emissive', look.toon);
        multiplyUniformColor(material, 'specular', look.specular);
        setUniformNumber(material, 'shininess', look.shininess);
      }
    }

    function ensureMaterialLookShader(material) {
      if (!material) return;
      if (!material.userData) material.userData = {};
      if (material.userData.danxeShaderPatched) return;
      const previousCompile = material.onBeforeCompile;
      const previousKey = material.customProgramCacheKey ? material.customProgramCacheKey.bind(material) : null;
      material.onBeforeCompile = (shader, renderer) => {
        if (previousCompile) previousCompile(shader, renderer);
        const look = state.look && state.look.enabled !== false ? state.look : neutralLook;
        shader.uniforms.danxeLookEnabled = { value: state.look && state.look.enabled !== false ? 1.0 : 0.0 };
        shader.uniforms.danxeContrast = { value: look.contrast };
        shader.uniforms.danxeSaturation = { value: look.saturation * look.texture };
        shader.uniforms.danxeBrightness = { value: look.brightness };
        shader.uniforms.danxeDehaze = { value: look.dehaze };
        shader.uniforms.danxeToonStrength = { value: toonStrengthFor(look, true) };
        shader.uniforms.danxeToonSteps = { value: 5.0 };
        shader.fragmentShader = injectLookShader(shader.fragmentShader);
        material.userData.danxeShaderUniforms = shader.uniforms;
      };
      material.customProgramCacheKey = () => {
        const baseKey = previousKey ? previousKey() : '';
        return `${baseKey}|danxe-look-v3`;
      };
      material.userData.danxeShaderPatched = true;
      material.needsUpdate = true;
    }

    function injectLookShader(fragmentShader) {
      const header = `
uniform float danxeLookEnabled;
uniform float danxeContrast;
uniform float danxeSaturation;
uniform float danxeBrightness;
uniform float danxeDehaze;
uniform float danxeToonStrength;
uniform float danxeToonSteps;

vec3 danxeApplyLook(vec3 color) {
  if (danxeLookEnabled < 0.5) return color;
  color = max((color - vec3(danxeDehaze)) / max(1.0 - danxeDehaze, 0.001), vec3(0.0));
  color *= danxeBrightness;
  color = (color - vec3(0.5)) * danxeContrast + vec3(0.5);
  float luma = dot(color, vec3(0.299, 0.587, 0.114));
  float chroma = max(max(color.r, color.g), color.b) - min(min(color.r, color.g), color.b);
  float vibrance = max(danxeSaturation - 1.0, 0.0) * (1.0 - clamp(chroma, 0.0, 1.0));
  color = mix(vec3(luma), color, danxeSaturation + vibrance);
  vec3 stepped = floor(clamp(color, 0.0, 1.8) * danxeToonSteps + 0.5) / danxeToonSteps;
  color = mix(color, stepped, danxeToonStrength);
  float highlight = smoothstep(0.64, 1.0, luma);
  color += vec3(highlight * danxeToonStrength * 0.08);
  return max(color, vec3(0.0));
}
`;
      let shader = withLookHeader(fragmentShader, header);
      if (shader.includes('#include <colorspace_fragment>')) {
        return shader.replace(
          '#include <colorspace_fragment>',
          'gl_FragColor.rgb = danxeApplyLook(gl_FragColor.rgb);\n#include <colorspace_fragment>'
        );
      }
      if (shader.includes('#include <encodings_fragment>')) {
        return shader.replace(
          '#include <encodings_fragment>',
          'gl_FragColor.rgb = danxeApplyLook(gl_FragColor.rgb);\n#include <encodings_fragment>'
        );
      }
      return shader.replace(
        /gl_FragColor\s*=\s*([^;]+);/g,
        'gl_FragColor = $1;\ngl_FragColor.rgb = danxeApplyLook(gl_FragColor.rgb);'
      );
    }

    function withLookHeader(fragmentShader, header) {
      if (!fragmentShader.startsWith('#version')) return header + fragmentShader;
      const lineEnd = fragmentShader.indexOf('\n');
      if (lineEnd < 0) return fragmentShader + '\n' + header;
      return fragmentShader.slice(0, lineEnd + 1) + header + fragmentShader.slice(lineEnd + 1);
    }

    function updateLookShaderUniforms(material, look, enabled) {
      const uniforms = material.userData && material.userData.danxeShaderUniforms;
      if (!uniforms) return;
      const active = enabled ? look : neutralLook;
      uniforms.danxeLookEnabled.value = enabled ? 1.0 : 0.0;
      uniforms.danxeContrast.value = active.contrast;
      uniforms.danxeSaturation.value = active.saturation * active.texture;
      uniforms.danxeBrightness.value = active.brightness;
      uniforms.danxeDehaze.value = active.dehaze;
      uniforms.danxeToonStrength.value = toonStrengthFor(active, enabled);
      uniforms.danxeToonSteps.value = 5.0;
    }

    function toonStrengthFor(look, enabled) {
      if (!enabled) return 0.0;
      return clamp(0.18 + (look.toon - 1.0) * 0.12, 0.0, 0.36);
    }

    function materialLookBase(material) {
      if (!material.userData) material.userData = {};
      if (!material.userData.danxeLookBase) {
        material.userData.danxeLookBase = {
          color: material.color && material.color.isColor ? material.color.clone() : null,
          emissive: material.emissive && material.emissive.isColor ? material.emissive.clone() : null,
          specular: material.specular && material.specular.isColor ? material.specular.clone() : null,
          shininess: typeof material.shininess === 'number' ? material.shininess : null,
          uniforms: {
            diffuse: captureUniform(material, 'diffuse'),
            emissive: captureUniform(material, 'emissive'),
            specular: captureUniform(material, 'specular'),
            shininess: captureUniform(material, 'shininess')
          }
        };
      }
      return material.userData.danxeLookBase;
    }

    function captureUniform(material, name) {
      const uniform = material.uniforms && material.uniforms[name];
      if (!uniform) return null;
      const value = uniform.value;
      if (value && value.isColor) return value.clone();
      return typeof value === 'number' ? value : null;
    }

    function restoreUniformColor(material, base, name) {
      const uniform = material.uniforms && material.uniforms[name];
      const baseValue = base.uniforms[name];
      if (!uniform || !baseValue || !baseValue.isColor || !uniform.value || !uniform.value.isColor) return;
      uniform.value.copy(baseValue);
    }

    function restoreUniformNumber(material, base, name) {
      const uniform = material.uniforms && material.uniforms[name];
      const baseValue = base.uniforms[name];
      if (!uniform || typeof baseValue !== 'number') return;
      uniform.value = baseValue;
    }

    function tuneUniformColor(material, name, look) {
      const uniform = material.uniforms && material.uniforms[name];
      if (!uniform || !uniform.value || !uniform.value.isColor) return;
      tuneColor(uniform.value, look);
    }

    function multiplyUniformColor(material, name, scale) {
      const uniform = material.uniforms && material.uniforms[name];
      if (!uniform || !uniform.value || !uniform.value.isColor) return;
      uniform.value.multiplyScalar(scale);
    }

    function setUniformNumber(material, name, value) {
      const uniform = material.uniforms && material.uniforms[name];
      if (!uniform || typeof uniform.value !== 'number') return;
      uniform.value = value;
    }

    function tuneColor(color, look) {
      const hsl = {};
      color.getHSL(hsl);
      const texturePunch = 0.88 + look.texture * 0.12;
      hsl.s = clamp(hsl.s * look.saturation * look.texture, 0, 1);
      hsl.l = clamp((hsl.l - look.dehaze) / Math.max(1.0 - look.dehaze, 0.001), 0, 1);
      hsl.l = clamp(((hsl.l - 0.5) * look.contrast * texturePunch + 0.5) * look.brightness, 0, 1);
      color.setHSL(hsl.h, hsl.s, hsl.l);
    }

    function prepareTextureColorSpace(material) {
      const textureKeys = ['map', 'emissiveMap', 'lightMap'];
      for (const key of textureKeys) {
        const texture = material[key];
        if (!texture || !texture.isTexture) continue;
        if ('colorSpace' in texture) {
          if (texture.colorSpace !== THREE.SRGBColorSpace) {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.needsUpdate = true;
          }
        } else if ('encoding' in texture && THREE.sRGBEncoding) {
          if (texture.encoding !== THREE.sRGBEncoding) {
            texture.encoding = THREE.sRGBEncoding;
            texture.needsUpdate = true;
          }
        }
      }
    }

    function resetScene() {
      if (!state.scene) return;
      for (const mesh of activeMeshes()) {
        state.scene.remove(mesh);
        disposeObject(mesh);
      }
      if (state.audio) {
        try { state.audio.stop(); } catch (_) {}
      }
      state.helper = createAnimationHelper();
      state.mesh = null;
      state.modelInstances = [];
      state.parts = [];
      state.audio = null;
      state.current = 0;
      state.duration = 0;
      state.playing = false;
      state.loaded = false;
      state.cameraMotion = false;
      state.sceneSignature = '';
      state.physicsEnabled = false;
      state.physicsWarningShown = false;
      if (state.controls) state.controls.enabled = true;
      if (state.contactShadow) state.contactShadow.visible = false;
      postParts();
    }

    function createAnimationHelper() {
      return buildAnimationHelper({});
    }

    function buildAnimationHelper(options) {
      const helper = new MMDAnimationHelper({
        sync: true,
        pmxAnimation: options.pmxAnimation === true,
        resetPhysicsOnLoop: true
      });
      patchGrantSolver(helper);
      helper.enable('physics', options.physics !== false);
      helper.enable('grant', options.grant !== false);
      helper.enable('ik', options.ik !== false);
      return helper;
    }

    function patchGrantSolver(helper) {
      const createGrantSolver = helper.createGrantSolver.bind(helper);
      helper.createGrantSolver = (mesh) => {
        const solver = createGrantSolver(mesh);
        const updateOne = solver.updateOne.bind(solver);
        solver.updateOne = (grant) => {
          const bones = solver.mesh && solver.mesh.skeleton ? solver.mesh.skeleton.bones : [];
          if (!grant || !bones[grant.index] || !bones[grant.parentIndex]) return solver;
          return updateOne(grant);
        };
        return solver;
      };
    }

    function disposeObject(object) {
      object.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        for (const material of materials) {
          if (!material) continue;
          for (const key of Object.keys(material)) {
            const value = material[key];
            if (value && value.isTexture) value.dispose();
          }
          material.dispose();
        }
      });
    }

    function enhanceModelRender(mesh) {
      if (!mesh) return;
      mesh.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        for (const material of materials) {
          if (!material) continue;
          material.shadowSide = THREE.FrontSide;
          if (!material.userData) material.userData = {};
          material.userData.outlineParameters = {
            thickness: 0.0032,
            color: [0.018, 0.021, 0.028],
            alpha: 0.58,
            visible: true,
            keepAlive: true
          };
          if ('roughness' in material) material.roughness = Math.min(material.roughness ?? 0.72, 0.76);
          if ('metalness' in material) material.metalness = Math.max(material.metalness ?? 0.0, 0.0);
          material.needsUpdate = true;
        }
      });
      updateGroundingForModels();
      configureShadowForModels();
    }

    function sceneModelBounds() {
      const meshes = activeMeshes();
      if (meshes.length === 0) return null;
      const box = new THREE.Box3();
      for (const mesh of meshes) {
        box.expandByObject(mesh);
      }
      return box.isEmpty() ? null : box;
    }

    function updateGroundingForModels() {
      if (!state.contactShadow) return;
      const box = sceneModelBounds();
      if (!box) {
        state.contactShadow.visible = false;
        return;
      }
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const radius = Math.max(size.x, size.z, size.y * 0.42, 1.0);
      state.contactShadow.position.set(center.x, Math.max(box.min.y + 0.012, 0.008), center.z);
      state.contactShadow.scale.set(radius * 0.52, radius * 0.34, 1);
      state.contactShadow.visible = true;
    }

    function configureShadowForModels() {
      if (!state.keyLight || !state.keyLight.shadow) return;
      const box = sceneModelBounds();
      if (!box) return;
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z, 8);
      if (state.keyLightTarget) state.keyLightTarget.position.copy(center);
      state.keyLight.position.set(center.x + radius * 1.0, center.y + radius * 1.7, center.z + radius * 0.9);
      const camera = state.keyLight.shadow.camera;
      const extent = radius * 0.8;
      camera.left = -extent;
      camera.right = extent;
      camera.top = extent;
      camera.bottom = -extent;
      camera.near = 0.5;
      camera.far = Math.max(radius * 4.0, 80);
      camera.updateProjectionMatrix();
    }

    function publishModelParts() {
      state.parts = buildModelParts();
      postParts();
    }

    function postParts() {
      post({ type: 'parts', parts: state.parts || [] });
    }

    function buildModelParts() {
      const parts = [];
      for (const instance of state.modelInstances || []) {
        let counter = 0;
        const prefix = instance.name || 'Model';
        instance.mesh.traverse((child) => {
          if (!child.material) return;
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          const mmdMaterials = child.geometry &&
            child.geometry.userData &&
            child.geometry.userData.MMD &&
            Array.isArray(child.geometry.userData.MMD.materials)
            ? child.geometry.userData.MMD.materials
            : [];
          materials.forEach((material, index) => {
            if (!material) return;
            if (!material.userData) material.userData = {};
            const id = `${instance.id}:mat:${counter++}`;
            const meta = mmdMaterials[index] || {};
            const rawName = material.name || meta.name || meta.englishName || meta.nameEn || `Part ${counter}`;
            material.userData.danxePartId = id;
            material.userData.danxePartName = String(rawName).trim() || `Part ${counter}`;
            if (typeof material.visible !== 'boolean') material.visible = true;
            parts.push({
              id,
              name: `${prefix} / ${material.userData.danxePartName}`,
              visible: material.visible !== false
            });
          });
        });
      }
      return parts;
    }

    function setPartVisibility(payload) {
      const id = payload && payload.id ? String(payload.id) : '';
      const visible = !(payload && payload.visible === false);
      if (!id || activeMeshes().length === 0) return;
      for (const mesh of activeMeshes()) {
        mesh.traverse((child) => {
        if (!child.material) return;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        for (const material of materials) {
          if (material && material.userData && material.userData.danxePartId === id) {
            material.visible = visible;
            material.needsUpdate = true;
          }
        }
        });
      }
      state.parts = (state.parts || []).map((part) => (
        part.id === id ? { ...part, visible } : part
      ));
      postParts();
      postStatus();
    }

    function normalizeSceneModels(input) {
      if (Array.isArray(input.models)) {
        return input.models
          .filter((item) => item && item.modelUrl)
          .map((item, index) => ({
            id: String(item.id || `model-${index + 1}`),
            modelUrl: String(item.modelUrl),
            modelName: item.modelName ? String(item.modelName) : `Model ${index + 1}`,
            motionUrls: Array.isArray(item.motionUrls) ? item.motionUrls : [],
            transform: normalizeTransform(item.transform)
          }));
      }
      if (!input.modelUrl) return [];
      return [{
        id: 'primary',
        modelUrl: String(input.modelUrl),
        modelName: input.modelName ? String(input.modelName) : 'Model',
        motionUrls: Array.isArray(input.motionUrls) ? input.motionUrls : [],
        transform: normalizeTransform(input.transform)
      }];
    }

    function sceneModelSignature(models) {
      return models
        .map((item) => `${item.id}:${item.modelUrl}`)
        .join('|');
    }

    function normalizeTransform(payload) {
      const source = payload && typeof payload === 'object' ? payload : {};
      return {
        x: clampNumber(source.x, 0, -50, 50),
        y: clampNumber(source.y, 0, -20, 80),
        z: clampNumber(source.z, 0, -50, 50)
      };
    }

    function applyModelTransform(instance, transform, refresh = true) {
      if (!instance || !instance.mesh) return;
      const next = normalizeTransform(transform);
      instance.transform = next;
      instance.mesh.position.set(next.x, next.y, next.z);
      if (refresh) {
        updateGroundingForModels();
        configureShadowForModels();
        postStatus();
      }
    }

    function setModelTransform(payload) {
      const id = payload && payload.id ? String(payload.id) : '';
      const instance = (state.modelInstances || []).find((item) => item.id === id);
      if (!instance) return;
      applyModelTransform(instance, payload, true);
    }

    async function loadScene(input) {
      initRenderer();
      const modelInputs = normalizeSceneModels(input || {});
      const nextSignature = sceneModelSignature(modelInputs);
      const preserveCamera = state.loaded && state.sceneSignature === nextSignature;
      const cameraSnapshot = preserveCamera ? snapshotCamera() : null;
      resetScene();
      if (modelInputs.length === 0) {
        state.modelUrl = null;
        state.sceneSignature = '';
        setStatus('No PMX model selected.');
        post({ type: 'loaded', loaded: false, duration: 0 });
        return;
      }
      state.loading = true;
      setStatus(`Loading ${modelInputs.length} PMX model${modelInputs.length === 1 ? '' : 's'}...`);
      post({ type: 'loading', loading: true });
      const loader = new MMDLoader();
      loader.setCrossOrigin('anonymous');

      try {
        const physicsReady = await ensurePhysicsReady();
        const cameraUrls = Array.isArray(input.cameraUrls) ? input.cameraUrls : [];
        const loadedModels = [];

        for (const modelInput of modelInputs) {
          const motionUrls = Array.isArray(modelInput.motionUrls) ? modelInput.motionUrls : [];
          const mmd = await loadModelAndMotion(loader, modelInput.modelUrl, motionUrls);
          const mesh = mmd.mesh;
          mesh.frustumCulled = false;
          sanitizeMmdMetadata(mesh);
          const instance = {
            id: modelInput.id,
            name: modelInput.modelName || modelInput.name || 'Model',
            mesh,
            animation: mmd.animation,
            transform: normalizeTransform(modelInput.transform)
          };
          state.modelInstances.push(instance);
          if (!state.mesh) state.mesh = mesh;
          state.scene.add(mesh);
          applyModelTransform(instance, instance.transform, false);
          enhanceModelRender(mesh);
          loadedModels.push(instance);
        }

        publishModelParts();
        updateGroundingForModels();
        configureShadowForModels();
        applyLook();
        const helperState = addMeshesToHelper(loadedModels, physicsReady);
        state.physicsEnabled = helperState.physics;
        if (helperState.animation !== false) {
          for (const item of loadedModels) {
            state.duration = Math.max(state.duration, animationDuration(item.animation));
          }
        }
        state.modelUrl = modelInputs[0].modelUrl;
        state.sceneSignature = nextSignature;

        if (cameraUrls.length > 0) {
          const cameraAnimation = await loadCameraAnimation(loader, cameraUrls);
          state.helper.add(state.camera, { animation: cameraAnimation });
          state.cameraMotion = true;
          state.controls.enabled = false;
          state.duration = Math.max(state.duration, animationDuration(cameraAnimation));
        } else {
          state.controls.enabled = true;
          if (cameraSnapshot) {
            restoreCamera(cameraSnapshot);
          } else {
            frameModels();
          }
        }

        if (input.audioUrl) {
          await loadAudio(input.audioUrl);
        }

        state.loaded = true;
        state.loading = false;
        state.current = 0;
        setHelperTime(0, true, physicsProfile.loadWarmup);
        setStatus('', true);
        postStatus();
      } catch (error) {
        state.loading = false;
        state.loaded = false;
        const message = error && error.message ? error.message : String(error);
        setStatus('Renderer error:\n' + message);
        post({ type: 'error', message });
      }
    }

    function sanitizeMmdMetadata(mesh) {
      const geometry = mesh && mesh.geometry;
      const mmd = geometry && geometry.userData ? geometry.userData.MMD : null;
      const skeletonBones = mesh && mesh.skeleton ? mesh.skeleton.bones : [];
      if (!mmd || !Array.isArray(mmd.bones) || skeletonBones.length === 0) return;

      const validBoneIndex = (index) => (
        Number.isInteger(index) &&
        index >= 0 &&
        index < skeletonBones.length &&
        !!skeletonBones[index]
      );
      const removedGrantKeys = new Set();
      let removedIks = 0;
      let removedIkLinks = 0;

      for (let index = 0; index < mmd.bones.length; index++) {
        const bone = mmd.bones[index];
        if (!bone) continue;
        if (bone.grant && (!validBoneIndex(index) || !validBoneIndex(bone.grant.parentIndex))) {
          removedGrantKeys.add(`${index}:${bone.grant.parentIndex}`);
          delete bone.grant;
        }
        if (bone.ik) {
          if (!validBoneIndex(index) || !validBoneIndex(bone.ik.effector)) {
            delete bone.ik;
            removedIks += 1;
          } else if (Array.isArray(bone.ik.links)) {
            const links = bone.ik.links.filter((link) => validBoneIndex(link.index));
            removedIkLinks += bone.ik.links.length - links.length;
            bone.ik.links = links;
          }
        }
      }

      if (Array.isArray(mmd.grants)) {
        const grants = mmd.grants.filter((grant) =>
          validBoneIndex(grant.index) && validBoneIndex(grant.parentIndex)
        );
        for (const grant of mmd.grants) {
          if (!validBoneIndex(grant.index) || !validBoneIndex(grant.parentIndex)) {
            removedGrantKeys.add(`${grant.index}:${grant.parentIndex}`);
          }
        }
        mmd.grants = grants;
      }

      if (Array.isArray(mmd.iks)) {
        const iks = [];
        for (const ik of mmd.iks) {
          if (!validBoneIndex(ik.target) || !validBoneIndex(ik.effector)) {
            removedIks += 1;
            continue;
          }
          if (Array.isArray(ik.links)) {
            const links = ik.links.filter((link) => validBoneIndex(link.index));
            removedIkLinks += ik.links.length - links.length;
            ik.links = links;
          }
          iks.push(ik);
        }
        mmd.iks = iks;
      }

      if (removedGrantKeys.size || removedIks || removedIkLinks) {
        post({
          type: 'message',
          message: `Sanitized PMX metadata: ${removedGrantKeys.size} grant, ${removedIks} IK, ${removedIkLinks} IK links.`,
          hidden: true
        });
      }
    }

    function addMeshesToHelper(items, physicsReady) {
      const plans = [
        { physics: physicsReady, grant: true, ik: true, pmxAnimation: false, label: 'standard MMD animation with physics' },
        { physics: physicsReady, grant: true, ik: true, pmxAnimation: true, label: 'PMX ordered animation with physics' },
        { physics: false, grant: true, ik: true, pmxAnimation: false, label: 'standard MMD animation without physics' },
        { physics: false, grant: true, ik: true, pmxAnimation: true, label: 'PMX ordered animation without physics' },
        { physics: false, grant: false, ik: true, pmxAnimation: false, label: 'IK animation without grant' },
        { physics: false, grant: false, ik: false, pmxAnimation: false, label: 'basic skeletal animation' }
      ].filter((plan, index, all) => {
        if (plan.physics && !physicsReady) return false;
        return all.findIndex((item) =>
          item.physics === plan.physics &&
          item.grant === plan.grant &&
          item.ik === plan.ik &&
          item.pmxAnimation === plan.pmxAnimation
        ) === index;
      });

      let firstError = null;
      for (const plan of plans) {
        try {
          const helper = buildAnimationHelper(plan);
          for (const item of items) {
            helper.add(
              item.mesh,
              plan.physics ? { animation: item.animation, ...physicsParams } : { animation: item.animation, physics: false }
            );
          }
          helper.enable('physics', plan.physics);
          helper.enable('grant', plan.grant);
          helper.enable('ik', plan.ik);
          helper.update(0);
          state.helper = helper;
          for (const item of items) {
            postPhysicsStatus(item.mesh, physicsReady, plan, firstError, item.name);
          }
          postHelperMode(plan, firstError);
          return { ...plan, animation: true };
        } catch (error) {
          firstError = firstError || error;
        }
      }

      state.helper = buildAnimationHelper({
        physics: false,
        grant: false,
        ik: false,
        pmxAnimation: false
      });
      for (const item of items) {
        state.helper.add(item.mesh, { physics: false });
        postPhysicsStatus(
          item.mesh,
          physicsReady,
          { physics: false, grant: false, ik: false, pmxAnimation: false, label: 'basic skeletal animation' },
          firstError,
          item.name
        );
      }
      post({
        type: 'message',
        message: `Motion skipped for one or more models: ${errorMessage(firstError)}`,
        hidden: true
      });
      return { physics: false, grant: false, ik: false, pmxAnimation: false, animation: false };
    }

    function postHelperMode(plan, firstError) {
      if (firstError && !plan.physics) postPhysicsWarning(errorMessage(firstError));
      const disabled = [
        ifFalse(plan.physics, 'physics'),
        ifFalse(plan.grant, 'grant'),
        ifFalse(plan.ik, 'IK'),
      ].filter(Boolean);
      const suffix = disabled.length > 0 ? `; disabled ${disabled.join(', ')}` : '';
      post({
        type: 'message',
        message: `MMD helper mode: ${plan.label}${suffix}.`,
        hidden: true
      });
    }

    function postPhysicsStatus(mesh, physicsReady, plan, firstError, modelName = '') {
      const stats = mmdPhysicsStats(mesh);
      const reason = physicsInactiveReason(stats, physicsReady, plan, firstError);
      const gravity = physicsParams.gravity;
      const prefix = modelName ? `${modelName}: ` : '';
      const details = [
        `runtime=${physicsReady ? 'ready' : 'unavailable'}`,
        `enabled=${plan.physics ? 'yes' : 'no'}`,
        `rigidBodies=${stats.rigidBodies}`,
        `joints=${stats.joints}`,
        `bones=${stats.bones}`,
        `profile=${physicsProfile.name}`,
        `gravity=(${formatNumber(gravity.x)},${formatNumber(gravity.y)},${formatNumber(gravity.z)})`,
        `warmup=${physicsParams.warmup}`,
        `unitStep=${formatNumber(physicsParams.unitStep)}`,
        `maxStep=${physicsParams.maxStepNum}`,
        `frameStep=${formatNumber(physicsFrameStep)}`,
        `exportStep=${formatNumber(physicsProfile.exportStep)}`
      ];
      post({
        type: 'message',
        message: `MMD physics: ${prefix}${details.join(', ')}${reason ? `; ${reason}` : ''}.`,
        hidden: true
      });
    }

    function mmdPhysicsStats(mesh) {
      const geometry = mesh && mesh.geometry;
      const mmd = geometry && geometry.userData ? geometry.userData.MMD : null;
      const skeletonBones = mesh && mesh.skeleton && Array.isArray(mesh.skeleton.bones)
        ? mesh.skeleton.bones.length
        : 0;
      if (!mmd) {
        return { rigidBodies: 0, joints: 0, bones: skeletonBones };
      }
      return {
        rigidBodies: Array.isArray(mmd.rigidBodies) ? mmd.rigidBodies.length : 0,
        joints: Array.isArray(mmd.constraints)
          ? mmd.constraints.length
          : Array.isArray(mmd.joints)
            ? mmd.joints.length
            : 0,
        bones: skeletonBones
      };
    }

    function physicsInactiveReason(stats, physicsReady, plan, firstError) {
      if (!physicsReady) return 'gravity inactive because Ammo physics runtime is unavailable';
      if (stats.rigidBodies <= 0) return 'gravity inactive because this model has no MMD rigid bodies';
      if (plan.physics) return '';
      if (firstError) return `gravity inactive after physics fallback: ${errorMessage(firstError)}`;
      return 'gravity inactive because physics is disabled for this helper mode';
    }

    function formatNumber(value) {
      return Number(value).toFixed(3).replace(/\.?0+$/, '');
    }

    function ifFalse(value, label) {
      return value === false ? label : null;
    }

    function errorMessage(error) {
      return error && error.message ? error.message : String(error);
    }

    function loadModelAndMotion(loader, modelUrl, motionUrls) {
      return new Promise((resolve, reject) => {
        if (motionUrls.length > 0) {
          loader.loadWithAnimation(modelUrl, motionUrls, resolve, undefined, reject);
        } else {
          loader.load(modelUrl, (mesh) => resolve({ mesh, animation: undefined }), undefined, reject);
        }
      });
    }

    function loadCameraAnimation(loader, urls) {
      return new Promise((resolve, reject) => {
        loader.loadAnimation(urls, state.camera, resolve, undefined, reject);
      });
    }

    function loadAudio(url) {
      return new Promise((resolve, reject) => {
        const loader = new THREE.AudioLoader();
        loader.load(url, (buffer) => {
          const audio = new THREE.Audio(state.listener);
          audio.setBuffer(buffer);
          audio.setLoop(false);
          audio.setVolume(0.9);
          state.audio = audio;
          state.duration = Math.max(state.duration, buffer.duration);
          resolve();
        }, undefined, reject);
      });
    }

    function animationDuration(animation) {
      if (!animation) return 0;
      if (Array.isArray(animation)) {
        return animation.reduce((max, clip) => Math.max(max, clip.duration || 0), 0);
      }
      return animation.duration || 0;
    }

    function frameModels() {
      const box = sceneModelBounds();
      if (!box) return;
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      state.controls.target.copy(center);
      const radius = Math.max(size.x, size.y, size.z, 1);
      state.manualCamera.distance = Math.max(radius * 1.25, 20);
      applyManualCamera();
    }

    function applyManualCamera() {
      if (!state.controls || state.cameraMotion) return;
      const target = state.controls.target;
      const yaw = THREE.MathUtils.degToRad(state.manualCamera.yaw);
      const pitch = THREE.MathUtils.degToRad(state.manualCamera.pitch);
      const distance = state.manualCamera.distance;
      const x = Math.sin(yaw) * Math.cos(pitch) * distance;
      const y = Math.sin(pitch) * distance + target.y;
      const z = Math.cos(yaw) * Math.cos(pitch) * distance;
      state.camera.position.set(target.x + x, y, target.z + z);
      state.camera.lookAt(target);
      state.controls.update();
    }

    function snapshotCamera() {
      if (!state.camera || !state.controls) return null;
      return {
        position: state.camera.position.clone(),
        target: state.controls.target.clone(),
        manualCamera: { ...state.manualCamera }
      };
    }

    function restoreCamera(snapshot) {
      if (!snapshot || !state.camera || !state.controls) return;
      state.cameraMotion = false;
      state.controls.enabled = true;
      state.controls.target.copy(snapshot.target);
      state.camera.position.copy(snapshot.position);
      state.manualCamera = { ...snapshot.manualCamera };
      state.camera.lookAt(state.controls.target);
      state.controls.update();
    }

    function setHelperTime(second, stabilize = true, cycles = physicsProfile.seekWarmup) {
      state.current = Math.max(0, Math.min(second, Math.max(state.duration, 0)));
      if (!state.helper) return;
      for (const mesh of state.helper.meshes) {
        const object = state.helper.objects.get(mesh);
        if (object && object.mixer) object.mixer.setTime(state.current);
      }
      if (state.helper.camera) {
        const object = state.helper.objects.get(state.helper.camera);
        if (object && object.mixer) object.mixer.setTime(state.current);
      }
      state.helper.update(0);
      if (stabilize) stabilizePhysics(cycles);
    }

    function stabilizePhysics(cycles = physicsProfile.seekWarmup) {
      if (!state.physicsEnabled || !state.helper) return;
      for (const mesh of state.helper.meshes) {
        const object = state.helper.objects.get(mesh);
        if (object && object.physics) {
          object.physics.reset();
          object.physics.warmup(cycles);
        }
      }
    }

    function play() {
      if (!state.loaded) return;
      state.playing = true;
      clock.getDelta();
      if (state.audio && state.audio.buffer) {
        try {
          if (state.audio.isPlaying) state.audio.stop();
          state.audio.offset = Math.min(state.current, state.audio.buffer.duration);
          if (state.audio.setPlaybackRate) state.audio.setPlaybackRate(state.speed);
          state.audio.play();
        } catch (_) {}
      }
      postStatus();
    }

    function pause() {
      state.playing = false;
      if (state.audio && state.audio.isPlaying) {
        try { state.audio.stop(); } catch (_) {}
      }
      postStatus();
    }

    function seek(payload) {
      const second = Number(payload && payload.second || 0);
      const wasPlaying = state.playing;
      pause();
      setHelperTime(second);
      if (wasPlaying) play();
      postStatus();
    }

    function setSpeed(payload) {
      state.speed = Math.max(0.25, Math.min(Number(payload && payload.speed || 1), 2));
      if (state.audio && state.audio.setPlaybackRate) {
        try { state.audio.setPlaybackRate(state.speed); } catch (_) {}
      }
      postStatus();
    }

    function setCamera(payload) {
      state.manualCamera = {
        yaw: Number(payload && payload.yaw || state.manualCamera.yaw),
        pitch: Number(payload && payload.pitch || state.manualCamera.pitch),
        distance: Number(payload && payload.distance || state.manualCamera.distance)
      };
      if (state.cameraMotion) {
        state.cameraMotion = false;
        if (state.controls) state.controls.enabled = true;
      }
      applyManualCamera();
      postStatus();
    }

    function setCameraPreset(payload) {
      const preset = payload && payload.preset ? String(payload.preset) : 'fullFront';
      if (state.cameraMotion) state.cameraMotion = false;
      if (state.controls) state.controls.enabled = true;

      let distance = state.manualCamera.distance;
      let target = state.controls ? state.controls.target.clone() : new THREE.Vector3();
      const box = sceneModelBounds();
      if (box && state.controls) {
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const height = Math.max(size.y, 1);
        if (preset === 'halfFront') {
          target = new THREE.Vector3(center.x, box.min.y + height * 0.62, center.z);
          distance = Math.max(height * 1.05, 10);
        } else {
          target = new THREE.Vector3(center.x, box.min.y + height * 0.50, center.z);
          distance = Math.max(height * 1.9, 18);
        }
        state.controls.target.copy(target);
      }

      state.manualCamera = {
        yaw: 0,
        pitch: preset === 'halfFront' ? -2 : -4,
        distance
      };
      applyManualCamera();
      postStatus();
    }

    function clear() {
      pause();
      resetScene();
      state.modelUrl = null;
      setStatus('Select a PMX model.');
      postStatus();
    }

    async function exportVideo(settings) {
      if (!state.renderer || !state.loaded) {
        exportError('No rendered model is loaded.');
        return;
      }
      const canvas = state.renderer.domElement;
      if (!canvas.captureStream || !window.MediaRecorder) {
        exportError('This WebView does not support canvas video recording.');
        return;
      }
      const fps = Number(settings && settings.fps || 60);
      const width = Number(settings && settings.width || canvas.width);
      const height = Number(settings && settings.height || canvas.height);
      const bitrate = Math.max(2, Number(settings && settings.videoBitrateMbps || 16)) * 1000000;
      const seconds = Math.max(1, Math.min(Number(settings && settings.seconds || state.duration || 10), 600));
      const previous = {
        current: state.current,
        playing: state.playing,
        pixelRatio: state.renderer.getPixelRatio()
      };
      pause();
      state.renderer.setPixelRatio(1);
      state.renderer.setSize(width, height, false);
      resizeCamera(width, height);
      const chunks = [];
      const videoStream = canvas.captureStream(fps);
      const audioCapture = createExportAudioCapture();
      const hasAudio = audioCapture && audioCapture.stream.getAudioTracks().length > 0;
      const stream = mergeExportStreams(videoStream, audioCapture ? audioCapture.stream : null);
      const format = pickRecordingFormat(hasAudio);
      if (!format) {
        stream.getTracks().forEach((track) => track.stop());
        cleanupExportAudioCapture(audioCapture);
        exportError('This WebView does not support canvas video recording formats.');
        return;
      }
      const recorderOptions = {
        mimeType: format.mimeType,
        videoBitsPerSecond: bitrate
      };
      let recorder;
      try {
        recorder = new MediaRecorder(stream, recorderOptions);
      } catch (error) {
        stream.getTracks().forEach((track) => track.stop());
        cleanupExportAudioCapture(audioCapture);
        exportError(error && error.message ? error.message : 'Unable to start video recorder.');
        return;
      }
      state.recorder = recorder;
      recorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) chunks.push(event.data);
      };
      recorder.onerror = (event) => exportError(event.error ? event.error.message : 'Recording failed.');
      recorder.onstop = async () => {
        try {
          stream.getTracks().forEach((track) => track.stop());
          const blob = new Blob(chunks, { type: recorder.mimeType || format.mimeType });
          if (blob.size <= 0) {
            throw new Error('Recorder produced an empty video file.');
          }
          const bytes = new Uint8Array(await blob.arrayBuffer());
          let binary = '';
          for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
          const base64 = btoa(binary);
          const stamp = new Date().toISOString().replace(/[:.]/g, '-');
          window.DanxeAndroid.saveRecording(base64, blob.type || format.mimeType, `danxe_${stamp}.${format.extension}`);
        } catch (error) {
          exportError(error && error.message ? error.message : String(error));
        } finally {
          stopExportAudioCapture(audioCapture);
          cleanupExportAudioCapture(audioCapture);
          stream.getTracks().forEach((track) => track.stop());
          state.renderer.setPixelRatio(previous.pixelRatio);
          resize();
          setHelperTime(previous.current);
          if (previous.playing) play();
          state.recorder = null;
        }
      };
      post({ type: 'exportStarted', seconds, fps, width, height, mimeType: format.mimeType, audio: hasAudio === true });
      state.playing = false;
      setHelperTime(0, true, physicsProfile.exportWarmup);
      renderExportFrame();
      recorder.start(1000);
      await waitForRecorderStart(recorder);
      await startExportAudioCapture(audioCapture);
      await recordFrames({ seconds });
      if (recorder.state !== 'inactive') {
        if (recorder.requestData) recorder.requestData();
        await wait(240);
        recorder.stop();
      }
    }

    async function waitForRecorderStart(recorder) {
      if (!recorder || recorder.state === 'recording') return;
      await new Promise((resolve) => {
        const done = () => resolve();
        recorder.addEventListener('start', done, { once: true });
        setTimeout(done, 180);
      });
    }

    function createExportAudioCapture() {
      if (!state.audio || !state.audio.buffer || !state.listener) return null;
      const context = state.listener.context;
      if (!context || !context.createMediaStreamDestination) return null;
      const output = state.audio.getOutput ? state.audio.getOutput() : state.audio.gain;
      if (!output || !output.connect) return null;
      const destination = context.createMediaStreamDestination();
      try {
        output.connect(destination);
      } catch (_) {
        return null;
      }
      return { destination, output, stream: destination.stream };
    }

    function mergeExportStreams(videoStream, audioStream) {
      if (!audioStream || audioStream.getAudioTracks().length <= 0 || !window.MediaStream) {
        return videoStream;
      }
      return new MediaStream([
        ...videoStream.getVideoTracks(),
        ...audioStream.getAudioTracks()
      ]);
    }

    async function startExportAudioCapture(capture) {
      if (!capture || !state.audio || !state.audio.buffer) return;
      try {
        const context = state.listener && state.listener.context;
        if (context && context.state === 'suspended' && context.resume) {
          await context.resume();
        }
        if (state.audio.isPlaying) state.audio.stop();
        state.audio.offset = 0;
        if (state.audio.setPlaybackRate) state.audio.setPlaybackRate(1);
        state.audio.play();
      } catch (_) {}
    }

    function stopExportAudioCapture(capture) {
      if (!capture || !state.audio) return;
      try {
        if (state.audio.isPlaying) state.audio.stop();
      } catch (_) {}
    }

    function cleanupExportAudioCapture(capture) {
      if (!capture || !capture.output || !capture.destination) return;
      try {
        capture.output.disconnect(capture.destination);
      } catch (_) {}
    }

    async function recordFrames({ seconds }) {
      const startTime = performance.now();
      let lastTime = startTime;
      await nextFrame();
      while (true) {
        if (!state.recorder || state.recorder.state === 'inactive') break;
        const now = performance.now();
        const elapsed = (now - startTime) / 1000;
        if (elapsed >= seconds) {
          setHelperTime(seconds, false);
          renderExportFrame();
          break;
        }
        const delta = Math.min(Math.max((now - lastTime) / 1000, 0), 1 / 8);
        lastTime = now;
        advanceAnimation(delta, physicsProfile.exportStep);
        renderExportFrame();
        await nextFrame();
      }
    }

    function renderExportFrame() {
      if (state.controls && !state.cameraMotion) state.controls.update();
      renderScene();
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function wait(milliseconds) {
      return new Promise((resolve) => setTimeout(resolve, milliseconds));
    }

    function exportError(message) {
      if (window.DanxeAndroid && window.DanxeAndroid.onExportError) {
        window.DanxeAndroid.onExportError(message);
      }
      post({ type: 'exportError', message });
    }

    function pickRecordingFormat(hasAudio) {
      const mp4Formats = hasAudio
        ? [
            { mimeType: 'video/mp4;codecs=avc1.42E01E,mp4a.40.2', extension: 'mp4' },
            { mimeType: 'video/mp4;codecs=h264,mp4a.40.2', extension: 'mp4' },
            { mimeType: 'video/mp4', extension: 'mp4' }
          ]
        : [
            { mimeType: 'video/mp4;codecs=avc1.42E01E', extension: 'mp4' },
            { mimeType: 'video/mp4;codecs=h264', extension: 'mp4' },
            { mimeType: 'video/mp4', extension: 'mp4' }
          ];
      const webmFormats = hasAudio
        ? [
            { mimeType: 'video/webm;codecs=vp9,opus', extension: 'webm' },
            { mimeType: 'video/webm;codecs=vp8,opus', extension: 'webm' },
            { mimeType: 'video/webm', extension: 'webm' }
          ]
        : [
            { mimeType: 'video/webm;codecs=vp9', extension: 'webm' },
            { mimeType: 'video/webm;codecs=vp8', extension: 'webm' },
            { mimeType: 'video/webm', extension: 'webm' }
          ];
      const formats = [...mp4Formats, ...webmFormats];
      return formats.find((format) => MediaRecorder.isTypeSupported(format.mimeType)) || null;
    }

    function tick() {
      requestAnimationFrame(tick);
      const delta = Math.min(clock.getDelta(), 1 / 10);
      if (state.loaded && state.playing && state.duration > 0) {
        advanceAnimation(delta * state.speed);
      }
      if (state.controls && !state.cameraMotion) state.controls.update();
      renderScene();
    }

    function renderScene() {
      if (!state.renderer || !state.scene || !state.camera) return;
      if (state.effect) {
        state.effect.render(state.scene, state.camera);
      } else {
        state.renderer.render(state.scene, state.camera);
      }
    }

    function advanceAnimation(delta, stepSize = physicsFrameStep) {
      if (!state.helper || delta <= 0) return;
      let remaining = delta;
      while (remaining > 0) {
        const step = Math.min(remaining, stepSize);
        const next = state.current + step;
        if (next >= state.duration) {
          const wrapped = state.duration > 0 ? next % state.duration : 0;
          setHelperTime(wrapped, true, physicsProfile.loopWarmup);
          restartAudioAtCurrent();
        } else {
          state.helper.update(step);
          state.current = next;
        }
        remaining -= step;
      }
    }

    function restartAudioAtCurrent() {
      if (!state.audio || !state.audio.buffer || !state.playing) return;
      try {
        if (state.audio.isPlaying) state.audio.stop();
        state.audio.offset = Math.min(state.current, state.audio.buffer.duration);
        if (state.audio.setPlaybackRate) state.audio.setPlaybackRate(state.speed);
        state.audio.play();
      } catch (_) {}
    }

    function postStatus() {
      post({
        type: 'status',
        loaded: state.loaded,
        loading: state.loading,
        playing: state.playing,
        current: state.current,
        duration: state.duration,
        speed: state.speed,
        cameraMotion: state.cameraMotion,
        physics: state.physicsEnabled,
        gridVisible: state.view.gridVisible === true && state.view.floorVisible !== true,
        floorVisible: state.view.floorVisible === true
      });
    }

    setInterval(postStatus, 350);

    function resize() {
      if (!state.renderer) return;
      state.renderer.setSize(innerWidth, innerHeight);
      resizeCamera(innerWidth, innerHeight);
    }

    function resizeCamera(width, height) {
      if (!state.camera) return;
      state.camera.aspect = width / Math.max(height, 1);
      state.camera.updateProjectionMatrix();
    }

    window.Danxe = {
      loadScene,
      clear,
      play,
      pause,
      seek,
      setSpeed,
      setCamera,
      setCameraPreset,
      setLook,
      setView,
      setPartVisibility,
      setModelTransform,
      exportVideo
    };
    initRenderer();
    postStatus();
  </script>
</body>
</html>
